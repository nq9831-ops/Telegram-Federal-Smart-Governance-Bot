# ============================================================
# TG联邦智能治理机器人 — 应用配置
# 所有敏感配置均通过环境变量注入，支持 Docker 和本地部署
# ⚠️  生产环境请勿使用默认值，请通过环境变量传入
# ============================================================
server.port=8080

# ---- 数据库配置 ----
# ⚠️  生产环境请通过环境变量设置强密码
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tg_federal_bot}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ---- Redis 配置 ----
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# ---- Elasticsearch 配置 ----
elasticsearch.uris=${ELASTICSEARCH_URIS:http://localhost:9900}
elasticsearch.rating-index=rating_v2

# ---- Telegram Bot 配置 ----
# ⚠️  生产环境必须配置真实的 Bot Token
bot.token=${BOT_TOKEN:dummy:token}
bot.username=${BOT_USERNAME:tg_federal_bot}
bot.creator=${BOT_CREATOR:5006320370}
bot.proxy-enabled=${BOT_PROXY_ENABLED:false}

# ---- DeepSeek AI 配置 ----
# ⚠️  生产环境请配置 API Key
deepseek.api-key=${DEEPSEEK_API_KEY:}
deepseek.api-url=https://api.deepseek.com/v1/chat/completions
deepseek.model=deepseek-chat

# ---- 并发控制 ----
concurrency.deepseek.max=10
concurrency.es.max=20
concurrency.wait-timeout-ms=30000

# ---- 管理员配置 ----
# ⚠️  生产环境必须配置强 Token（建议至少 32 位随机字符串）
# 未配置时管理员 API 将全部拒绝访问
admin.token=${ADMIN_TOKEN:}
# 管理员每日广播次数上限
admin.broadcast.daily-limit=${ADMIN_BROADCAST_DAILY_LIMIT:2}

# ---- 验证码配置 ----
captcha.expire-minutes=10
captcha.max-attempts=3

# ---- 日志配置 ----
logging.level.com.tgf.bot=INFO
logging.file.path=logs

# ---- 审核员配置 ----
bot.reviewers=${BOT_REVIEWERS:}
bot.webhook-secret=${BOT_WEBHOOK_SECRET:}

# ---- 信用分配置 ----
credit.daily-auto-increment=${CREDIT_DAILY_INCREMENT:1}
credit.max-score=${CREDIT_MAX_SCORE:100}

# ---- DeepSeek 超时 ----
deepseek.timeout-ms=${DEEPSEEK_TIMEOUT_MS:30000}

# ---- 内容审核模式 ----
moderation.provider=${MODERATION_PROVIDER:cloud}
moderation.local.api-url=${MODERATION_LOCAL_URL:http://localhost:11434/v1/chat/completions}
moderation.local.model=${MODERATION_LOCAL_MODEL:qwen2.5:7b}

# ---- 排行榜奖惩 ----
ranking.top-1-pct-reward=${RANKING_TOP1_REWARD:5}
ranking.top-2-5-pct-reward=${RANKING_TOP25_REWARD:3}
ranking.top-6-15-pct-reward=${RANKING_TOP615_REWARD:1}
ranking.bottom-6-15-pct-penalty=${RANKING_BOTTOM615_PENALTY:-1}
ranking.bottom-5-pct-penalty=${RANKING_BOTTOM5_PENALTY:-3}

# ---- 提交配置 ----
submission.cooldown-minutes=${SUBMISSION_COOLDOWN:5}
submission.daily-limit=${SUBMISSION_DAILY_LIMIT:10}
submission.require-captcha=${SUBMISSION_REQUIRE_CAPTCHA:true}

# ---- 冷启动配置 ----
system.cold-start=${SYSTEM_COLD_START:true}
system.cold-start-days=${SYSTEM_COLD_START_DAYS:7}

# ---- CORS 配置 ----
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}

# ---- 应用名 ----
spring.application.name=tg-federal-bot

# ---- Actuator 端点 ----
# ---- Actuator 安全配置 ----
# 仅公开 health 和 info（无需认证），prometheus 端点加基本认证
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.roles=ADMIN
management.endpoints.web.base-path=/actuator
# ---- Webhook 安全 ----
# Telegram 官方 IP 段（CIDR），用于 Webhook 来源校验
webhook.allowed-ips=${WEBHOOK_ALLOWED_IPS:91.108.4.0/22,91.108.8.0/22,91.108.56.0/22,149.154.160.0/20,149.154.164.0/22}
# 可信反向代理 IP 段（如 Nginx、Cloudflare），只有来自这些 IP 的 X-Forwarded-For 才被信任
# 未配置时直接使用 remoteAddr，不信任任何 XFF 头（防止 IP 伪造）
webhook.trusted-proxies=${WEBHOOK_TRUSTED_PROXIES:}
webhook.rate-limit-per-second=${WEBHOOK_RATE_LIMIT:50}
# 最大并发处理的 webhook 更新数（防止虚拟线程风暴打爆下游服务）
webhook.max-concurrent-updates=${WEBHOOK_MAX_CONCURRENT:500}
