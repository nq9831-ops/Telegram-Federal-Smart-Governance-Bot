# GitHub Actions CI 配置
# 每次 push 或 PR 时运行：编译、测试、SpotBugs 审计
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tg_federal_bot
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Create application.properties (CI)
        run: |
          cat > src/main/resources/application.properties << 'EOF'
          spring.application.name=tg-federal-bot
          server.port=8080
          bot.token=CI_TEST_TOKEN
          bot.username=CI_TEST_BOT
          bot.creator=123456789
          spring.datasource.url=jdbc:postgresql://localhost:5432/tg_federal_bot
          spring.datasource.username=postgres
          spring.datasource.password=postgres
          spring.data.redis.host=localhost
          spring.data.redis.port=6379
          EOF

      - name: Build & Test
        run: mvn -B clean verify -DskipTests=false

      - name: SpotBugs
        run: mvn -B compile spotbugs:check -Dspotbugs.effort=Max -Dspotbugs.threshold=Low

      - name: Upload SpotBugs Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: spotbugs-report
          path: target/spotbugs*.html
