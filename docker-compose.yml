services:
  postgres:
    image: postgres:16-alpine
    container_name: tgf-postgres
    environment:
      POSTGRES_DB: tg_federal_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tgf-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.15.5
    container_name: tgf-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
      - http.port=9900
    ports:
      - "9900:9900"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9900/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  app:
    build: .
    container_name: tgf-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tg_federal_bot
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      ELASTICSEARCH_URIS: http://elasticsearch:9900
      BOT_TOKEN: "${BOT_TOKEN:-test}"
      BOT_USERNAME: "${BOT_USERNAME:-tg_federal_bot}"
      BOT_CREATOR: "${BOT_CREATOR:-5006320370}"
      BOT_PROXY_ENABLED: "${BOT_PROXY_ENABLED:-false}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  pgdata:
  esdata:
