services:
  postgres:
    image: postgres:16-alpine
    container_name: tgf-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tg_federal_bot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请在 .env 中设置 POSTGRES_PASSWORD}
    # 生产环境不暴露端口到宿主机，仅内部网络访问
    # 如需外部访问，取消下面注释
    # ports:
    #   - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tgf-net

  redis:
    image: redis:7-alpine
    container_name: tgf-redis
    # 生产环境不暴露端口
    # ports:
    #   - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - redisdata:/data
    networks:
      - tgf-net

  elasticsearch:
    image: elasticsearch:8.15.5
    container_name: tgf-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - http.port=9200
    # 生产环境不暴露端口
    # ports:
    #   - "9900:9900"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - tgf-net

  app:
    build: .
    container_name: tgf-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-tg_federal_bot}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?请在 .env 中设置 POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      ELASTICSEARCH_URIS: http://elasticsearch:9200
      BOT_TOKEN: "${BOT_TOKEN:?请在 .env 中设置 BOT_TOKEN}"
      BOT_USERNAME: "${BOT_USERNAME:-tg_federal_bot}"
      BOT_CREATOR: "${BOT_CREATOR:-0}"
      BOT_PROXY_ENABLED: "${BOT_PROXY_ENABLED:-false}"
      BOT_PROXY_SOCKS5_HOST: "${BOT_PROXY_SOCKS5_HOST:-127.0.0.1}"
      BOT_PROXY_SOCKS5_PORT: "${BOT_PROXY_SOCKS5_PORT:-7890}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      ADMIN_TOKEN: "${ADMIN_TOKEN:?请在 .env 中设置 ADMIN_TOKEN}"
      SYSTEM_COLD_START: "${SYSTEM_COLD_START:-true}"
      SYSTEM_COLD_START_DAYS: "${SYSTEM_COLD_START_DAYS:-7}"
      # JVM 内存限制
      JAVA_OPTS: "${JAVA_OPTS:--Xms512m -Xmx1024m}"
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - tgf-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  tgf-net:
    driver: bridge

volumes:
  pgdata:
  esdata:
  redisdata:
